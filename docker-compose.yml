# Production stack for Oracle Cloud Always Free (Ubuntu + Docker)
# App (FastAPI + React static) behind Nginx on ports 80/443
#
# Usage:
#   cp backend/.env.example backend/.env
#   docker compose up -d --build

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: shankar-card-ai:latest
    container_name: shankar-card-app
    env_file:
      - backend/.env
    environment:
      PERFORMANCE_PROFILE: ${PERFORMANCE_PROFILE:-low}
      UNLOAD_MODELS_AFTER_USE: ${UNLOAD_MODELS_AFTER_USE:-true}
      DEVICE: ${DEVICE:-cpu}
    volumes:
      - app-uploads:/app/uploads
      - app-outputs:/app/outputs
      - app-weights:/app/weights
    expose:
      - "8000"
    restart: unless-stopped
    # Ampere Always Free can use 8–20g; lower if your VM has less RAM
    mem_limit: ${APP_MEM_LIMIT:-8g}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  nginx:
    image: nginx:1.27-alpine
    container_name: shankar-card-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

volumes:
  app-uploads:
  app-outputs:
  app-weights:
  certbot-www:
  certbot-certs:
