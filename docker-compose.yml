services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      - BG_PROVIDER=${BG_PROVIDER:-local}
      - PERFORMANCE_PROFILE=low
      - UNLOAD_MODELS_AFTER_USE=true
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    volumes:
      - app-uploads:/app/uploads
      - app-outputs:/app/outputs
      - app-weights:/app/weights
    restart: unless-stopped
    # AI models need RAM — raise if the host allows
    mem_limit: 6g

volumes:
  app-uploads:
  app-outputs:
  app-weights:
