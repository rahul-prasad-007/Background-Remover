# Nginx reverse proxy → FastAPI (React UI + /api)
# Used by docker-compose service "nginx"
# Docker DNS name for the app container: app:8000

upstream shankar_card_app {
    server app:8000;
    keepalive 16;
}

# HTTP — production entry (Certbot webroot + app proxy)
server {
    listen 80;
    listen [::]:80;
    server_name _;

    client_max_body_size 25m;

    # Let's Encrypt HTTP-01 challenges
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        allow all;
    }

    # Long-running AI jobs + SSE progress streams
    proxy_connect_timeout 60s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    send_timeout 600s;

    location /api/ {
        proxy_pass http://shankar_card_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        chunked_transfer_encoding on;
    }

    location /docs {
        proxy_pass http://shankar_card_app;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://shankar_card_app;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://shankar_card_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}

